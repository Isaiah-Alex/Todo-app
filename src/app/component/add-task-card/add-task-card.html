<form>
    <div>
        <label for="task-name">Task Name</label>
        <app-input-task
        inputId="tag-name"
        inputType="text"
        placeholder="Enter task name..."
        (value)="taskTitle.set($event)"
        [isFormCleared]="clearForm()"
        [inValue]="taskTitle()"
        />
        <span [class.red-style] = "displayText()">Please enter task name</span>
    </div>
    <div class="text-area">
        <label for="description">Description</label>
        <app-input-task
        inputId="description"
        inputType="textarea"
        placeholder="Enter task description..."
        (value)="taskDescription.set($event)"
        [isFormCleared]="clearForm()"
        [inValue]="taskDescription()"
        />
    </div>
    <app-btn
    [icon]="isEditTask() ? '': isDark() ? 'add-dark' : 'add'"
    [label]="isEditTask() ? 'Edit Task' : 'Add Task' "
    (click)="addTask($event)"/>
</form>
